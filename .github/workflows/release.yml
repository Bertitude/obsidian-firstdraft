name: Release Obsidian plugin

# Triggered by pushing a version-shaped tag (e.g. 0.1.0, 1.2.3). Builds
# the plugin, runs the sanity check that the tag matches manifest.json's
# version, and publishes a GitHub release with main.js + manifest.json
# + styles.css attached. BRAT auto-updates pull from these releases, so
# every published tag becomes an installable version.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Sanity check: the pushed tag must match manifest.json's version
      # exactly. Catches the common mistake of forgetting to bump the
      # manifest before tagging — without this the release would ship
      # artifacts that disagree with their own metadata, and BRAT would
      # silently install a "newer" version that's actually older code.
      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "Tag:      $TAG"
          echo "Manifest: $MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest.json version ($MANIFEST_VERSION). Bump the manifest before tagging."
            exit 1
          fi

      # Lint runs separately on every push via lint.yml — not gated here
      # so a UI-copy lint warning can't block a tagged release. The build
      # step below catches everything that actually affects shipped code
      # (typecheck via tsc -noEmit + esbuild).
      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          for f in main.js manifest.json styles.css; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing build artifact: $f"
              exit 1
            fi
          done

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title="$TAG" \
            --notes="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for release notes." \
            main.js manifest.json styles.css
